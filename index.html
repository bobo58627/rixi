<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMOᵃⁱ淘宝官方</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 32px;
        }
        
        .top-title {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 8px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
        }
        
        .edit-toggle {
            margin-top: 16px;
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        
        .edit-toggle:hover {
            background: #eee;
        }
        
        .edit-toggle.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 同步状态 */
        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        
        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .sync-dot.synced { background: #10b981; }
        .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
        .sync-dot.error { background: #ef4444; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 全选操作区 */
        .select-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .select-actions button {
            padding: 8px 16px;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        
        .select-actions button:hover {
            background: #eee;
            color: #333;
        }
        
        .paragraph-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .paragraph-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px 20px;
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .paragraph-item:hover {
            border-color: #ccc;
        }
        
        .paragraph-item.selected {
            background: #f0f7ff;
            border-color: #333;
        }
        
        .checkbox-wrapper {
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #333;
        }
        
        .paragraph-content {
            flex: 1;
            font-size: 13px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .paragraph-textarea {
            flex: 1;
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            border: none;
            background: transparent;
            resize: vertical;
            min-height: 60px;
            outline: none;
            font-family: inherit;
        }
        
        .delete-btn {
            flex-shrink: 0;
            padding: 6px 10px;
            background: transparent;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            color: #999;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #fee;
            border-color: #e74c3c;
            color: #e74c3c;
        }
        
        .action-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        
        .copy-btn {
            flex: 1;
            min-width: 200px;
            padding: 16px 32px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            background: #333;
            transform: translateY(-1px);
        }
        
        .copy-btn:active {
            transform: translateY(0);
        }
        
        .copy-btn.success {
            background: #10b981;
        }
        
        .add-btn {
            padding: 16px 24px;
            background: #fff;
            color: #1a1a1a;
            border: 2px dashed #ccc;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .add-btn:hover {
            border-color: #1a1a1a;
            background: #fafafa;
        }
        
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .share-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        
        .share-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .share-link {
            display: flex;
            gap: 8px;
        }
        
        .share-link input {
            flex: 1;
            padding: 12px 16px;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            outline: none;
        }
        
        .share-link button {
            padding: 12px 20px;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }
        
        .share-link button:hover {
            background: #eee;
        }
        
        .page-tabs-container {
            margin-bottom: 24px;
        }
        
        .page-selector {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            padding-bottom: 0;
        }
        
        .page-tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
            position: relative;
            margin-bottom: -2px;
        }
        
        .page-tab:hover {
            background: #e0e0e0;
        }
        
        .page-tab.active {
            background: #1a1a1a;
            color: #fff;
            z-index: 2;
        }
        
        .page-tab-line {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            position: relative;
            z-index: 1;
        }
        
        /* 底部编辑区 */
        .footer-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 14px 20px;
            z-index: 100;
        }
        
        .footer-content {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .edit-toggle-footer {
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            transition: color 0.2s;
        }
        
        .edit-toggle-footer:hover {
            color: #666;
        }
        
        .edit-toggle-footer.active {
            color: #1a1a1a;
            font-weight: 500;
        }
        
        /* 密码弹窗 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .password-box {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 380px;
            width: 100%;
        }
        
        .password-box h3 {
            margin-bottom: 20px;
            color: #1a1a1a;
            font-weight: 600;
        }
        
        .password-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }
        
        .password-box input:focus {
            border-color: #1a1a1a;
        }
        
        .password-box button {
            width: 100%;
            padding: 12px 32px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .password-box .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 12px;
        }
        
        .password-box .hint {
            color: #888;
            font-size: 12px;
            margin-top: 12px;
        }
        
        /* 复制用的隐藏文本框 */
        #copyHelper {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 100px;
            height: 30px;
        }
    </style>
</head>
<body>
    <textarea id="copyHelper"></textarea>
    
    <div class="container">
        <div class="header">
            <h1 class="title" id="pageTitle">MOMOᵃⁱ</h1>
            <p class="subtitle">日系清新风；勾选需要的内容即可。</p>
        </div>
        
        <div class="page-tabs-container">
            <div class="page-selector" id="pageSelector"></div>
            <div class="page-tab-line"></div>
        </div>
        
        <div class="paragraph-list" id="paragraphList"></div>
        
        <div class="select-actions" id="selectActions">
            <button onclick="selectAll()">全选</button>
            <button onclick="deselectAll()">全不选</button>
        </div>
        
        <div class="action-area">
            <button class="copy-btn" id="copyBtn">复制选中内容</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // 固定数据，不可编辑
        const data = {
            pages: {
                'page1': {
                    title: '提示词一',
                    paragraphs: [
                        '纯欲氛围感写真，冷白色的皮肤，双唇带着光泽，呈现出粉中透红的颜色，突出原生妆容质感。',
                        '奶油肌底，轻薄底妆，突出素颜纯欲感。',
                        '保留原图人物的五官结构、脸型轮廓、妆容细节和身体比例不变，不要扭曲面部特征，不要更改构图，原比例。'
                    ]
                },
                'page2': {
                    title: '提示词二',
                    paragraphs: [
                        '商业人像精修，双曲线明暗分层塑造，极致通透冷白皮，柔和明暗对比，干净通透肤色。',
                        '高级质感，柔和柔光真实光影，肤色均匀细腻，画面干净高级。',
                        '轻奢杂志商业写真，氛围感高级耐看，皮肤肌理自然保留。',
                        '保留原图人物的五官结构、脸型轮廓、妆容细节和身体比例不变，不要扭曲面部特征，不要更改构图，原比例。'
                    ]
                },
                'page3': {
                    title: '提示词三',
                    paragraphs: [
                        '模拟专业【85mm f/1.2 定焦镜头】的成像特征，对背景实施物理级递进式虚化，从主体后方开始产生平滑的光学衰减。焦外散景（Bokeh）需呈现出【圆润且中心稍亮】的光感质感。确保人物主体清晰锐利，严禁模糊侵蚀主体轮廓。',
                        '富士 Astia100 柔肤胶片预设，柯达 Portra400 肤色融合，双曲线立体光影塑形，中性灰皮肤过渡，奶雾冷白皮通透质感。',
                        '轻柔细腻胶片颗粒，柔雾漫反射真实光影，兼具网红高级质感，温柔治愈故事氛围感，五官脸型不畸变不修改，原比例。'
                    ]
                }
            }
        };
        let currentPage = 'page1';
        
        function doCopy(text) {
            const helper = document.getElementById('copyHelper');
            helper.value = text;
            helper.style.position = 'fixed';
            helper.style.left = '0';
            helper.style.top = '0';
            helper.style.opacity = '0';
            document.body.appendChild(helper);
            helper.focus();
            helper.select();
            let success = false;
            try { success = document.execCommand('copy'); } catch (e) {}
            helper.style.left = '-9999px';
            return success;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function init() {
            bindEvents();
            renderAll();
        }
        
        function bindEvents() {
            document.getElementById('copyBtn').addEventListener('click', copySelected);
        }
        
        function renderAll() {
            renderPageSelector();
            renderParagraphs();
        }
        
        function renderPageSelector() {
            const selector = document.getElementById('pageSelector');
            selector.classList.remove('hidden');
            
            let html = '';
            for (const [id, page] of Object.entries(data.pages)) {
                const isActive = id === currentPage;
                const title = page.title || '未命名';
                html += `<button class="page-tab ${isActive ? 'active' : ''}" onclick="switchPage('${id}')">${title}</button>`;
            }
            
            selector.innerHTML = html;
        }
        
        function switchPage(pageId) {
            currentPage = pageId;
            renderAll();
        }
        
        function renderParagraphs() {
            const list = document.getElementById('paragraphList');
            const page = data.pages[currentPage];
            
            if (!page) {
                list.innerHTML = '<p style="color:#999;text-align:center;padding:40px;">页面不存在</p>';
                return;
            }
            
            if (page.paragraphs.length === 0) {
                list.innerHTML = '<p style="color:#999;text-align:center;padding:40px;">暂无内容</p>';
                return;
            }
            
            let html = '';
            page.paragraphs.forEach((text, index) => {
                html += `
                    <div class="paragraph-item selected" id="item_${index}" onclick="toggleCheck(${index})">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="check_${index}" checked onclick="event.stopPropagation()">
                        </div>
                        <div class="paragraph-content">${text}</div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
        
        function selectAll() {
            const page = data.pages[currentPage];
            page.paragraphs.forEach((text, index) => {
                const checkbox = document.getElementById('check_' + index);
                const item = document.getElementById('item_' + index);
                if (checkbox) {
                    checkbox.checked = true;
                    item.classList.add('selected');
                }
            });
        }
        
        function deselectAll() {
            const page = data.pages[currentPage];
            page.paragraphs.forEach((text, index) => {
                const checkbox = document.getElementById('check_' + index);
                const item = document.getElementById('item_' + index);
                if (checkbox) {
                    checkbox.checked = false;
                    item.classList.remove('selected');
                }
            });
        }
        
        function toggleCheck(index) {
            const checkbox = document.getElementById('check_' + index);
            const item = document.getElementById('item_' + index);
            checkbox.checked = !checkbox.checked;
            item.classList.toggle('selected', checkbox.checked);
        }
        
        function copySelected() {
            const page = data.pages[currentPage];
            const selected = [];
            
            page.paragraphs.forEach((text, index) => {
                const checkbox = document.getElementById('check_' + index);
                if (checkbox && checkbox.checked) {
                    selected.push(text);
                }
            });
            
            if (selected.length === 0) {
                showToast('请先勾选要复制的内容');
                return;
            }
            
            const text = selected.join('\n\n');
            const success = doCopy(text);
            
            if (success) {
                showToast('已复制 ' + selected.length + ' 段内容');
                const btn = document.getElementById('copyBtn');
                btn.classList.add('success');
                setTimeout(() => btn.classList.remove('success'), 1500);
            } else {
                showToast('复制失败，请手动复制');
            }
        }
        
        init();
    </script>
</body>
</html>
